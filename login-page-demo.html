<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录页设计演示 | Login Page Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ===== 顶栏切换 ===== */
  .switch-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(15,23,42,.95); backdrop-filter: blur(12px);
    padding: .5rem 1.5rem; display: flex; align-items: center; gap: .5rem;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .switch-bar .logo { font-weight: 900; margin-right: auto; color: white; font-size: .9rem; }
  .switch-bar button {
    padding: .3rem .9rem; border: 1px solid #334155; background: #1e293b;
    color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: .73rem;
    transition: all .15s;
  }
  .switch-bar button:hover { border-color: #3b82f6; color: #e2e8f0; }
  .switch-bar button.on { background: #3b82f6; border-color: #3b82f6; color: white; }
  body { padding-top: 44px; }

  /* ===== 页面容器 ===== */
  .view { display: none; min-height: calc(100vh - 44px); }
  .view.on { display: flex; }

  /* ============================================
     布局1: 单栏垂直流式（移动端优先）
     ============================================ */
  .v1 {
    background: #f8fafc; align-items: center; justify-content: center;
    padding: 2rem 1rem; font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  .v1 .login-card {
    background: white; border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 400px;
    box-shadow: 0 2px 20px rgba(0,0,0,.04), 0 8px 40px rgba(0,0,0,.04);
  }
  .v1 .login-card .card-logo {
    text-align: center; margin-bottom: 1.5rem;
    font-size: 1.8rem; font-weight: 900; color: #1e293b;
  }
  .v1 .login-card .card-logo span {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .v1 .form-group {
    margin-bottom: 1.2rem; position: relative;
  }
  .v1 .form-group label {
    display: block; font-size: .82rem; font-weight: 500;
    color: #475569; margin-bottom: .3rem;
  }
  .v1 .form-group input {
    width: 100%; padding: .7rem .8rem; border: 2px solid #e2e8f0;
    border-radius: 8px; font-size: .9rem; outline: none;
    transition: border-color .25s, box-shadow .25s;
  }
  .v1 .form-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
  .v1 .form-group input.error { border-color: #ef4444; animation: shake .4s ease; }
  .v1 .form-group input.valid { border-color: #22c55e; }
  .v1 .form-group .hint {
    font-size: .7rem; margin-top: .2rem; min-height: .9rem;
  }
  .v1 .form-group .hint.err { color: #dc2626; }
  .v1 .form-group .hint.ok { color: #16a34a; }
  .v1 .login-btn {
    width: 100%; padding: .8rem; background: #3b82f6; color: white;
    border: none; border-radius: 8px; font-size: .95rem; font-weight: 700;
    cursor: pointer; transition: all .2s; display: flex;
    align-items: center; justify-content: center; gap: .5rem;
  }
  .v1 .login-btn:hover { background: #2563eb; }
  .v1 .login-btn:active { transform: scale(.98); }
  .v1 .login-btn.loading { background: #94a3b8; cursor: not-allowed; pointer-events: none; }
  .v1 .login-btn .btn-spinner {
    width: 16px; height: 16px; border: 2px solid transparent;
    border-top-color: white; border-radius: 50%;
    animation: spin .6s linear infinite; display: none;
  }
  .v1 .login-btn.loading .btn-spinner { display: inline-block; }
  .v1 .login-btn.loading .btn-text { display: none; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .v1 .extra-links {
    display: flex; justify-content: space-between; margin-top: 1rem;
    font-size: .78rem;
  }
  .v1 .extra-links a { color: #3b82f6; text-decoration: none; }
  .v1 .social-row {
    display: flex; gap: .8rem; justify-content: center; margin-top: 1.5rem;
  }
  .v1 .social-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid #e2e8f0; background: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.1rem; transition: all .15s;
  }
  .v1 .social-btn:hover { border-color: #94a3b8; transform: translateY(-2px); }

  /* ============================================
     布局2: 居中卡片悬浮式 (Glassmorphism)
     ============================================ */
  .v2 {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 30%, #4338ca 60%, #1e1b4b 100%);
    align-items: center; justify-content: center; padding: 2rem 1rem;
    position: relative; overflow: hidden;
    font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  .v2::before {
    content: ''; position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,.15), transparent);
    border-radius: 50%; top: -100px; left: -100px;
  }
  .v2::after {
    content: ''; position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(6,182,212,.1), transparent);
    border-radius: 50%; bottom: -80px; right: -80px;
  }
  .v2 .glass-card {
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 20px; padding: 2.5rem 2rem;
    width: 100%; max-width: 420px; position: relative; z-index: 1;
    color: white;
  }
  .v2 .glass-card h2 { text-align: center; margin-bottom: .3rem; font-size: 1.4rem; }
  .v2 .glass-card .subtitle {
    text-align: center; font-size: .8rem; color: rgba(255,255,255,.5);
    margin-bottom: 1.5rem;
  }
  .v2 .fg { margin-bottom: 1rem; }
  .v2 .fg input {
    width: 100%; padding: .75rem; background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
    font-size: .88rem; color: white; outline: none;
    transition: border-color .25s;
  }
  .v2 .fg input::placeholder { color: rgba(255,255,255,.3); }
  .v2 .fg input:focus { border-color: rgba(168,85,247,.5); }
  .v2 .fg input.error { border-color: rgba(248,113,113,.7); }
  .v2 .fg .h { font-size: .68rem; margin-top: .2rem; color: rgba(248,113,113,.8); min-height: .9rem; }
  .v2 .glass-btn {
    width: 100%; padding: .8rem; background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white; border: none; border-radius: 10px; font-size: .95rem;
    font-weight: 700; cursor: pointer; transition: all .3s;
  }
  .v2 .glass-btn:hover { box-shadow: 0 0 20px rgba(168,85,247,.4); }
  .v2 .glass-btn.loading { opacity: .6; pointer-events: none; }
  .v2 .v2-links { text-align: center; margin-top: 1rem; font-size: .75rem; }
  .v2 .v2-links a { color: rgba(255,255,255,.5); text-decoration: none; }

  /* ============================================
     布局3: 左文右表单分屏式
     ============================================ */
  .v3 {
    min-height: calc(100vh - 44px); display: flex;
    font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  .v3 .left-panel {
    flex: 1; background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white; display: flex; flex-direction: column;
    justify-content: center; padding: 4rem 3rem;
    position: relative; overflow: hidden;
  }
  .v3 .left-panel::before {
    content: ''; position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,.06), transparent);
    border-radius: 50%; right: -100px; top: -100px;
  }
  .v3 .left-panel .lp-content { position: relative; z-index: 1; max-width: 440px; }
  .v3 .left-panel h2 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; }
  .v3 .left-panel p { color: #94a3b8; line-height: 1.8; font-size: .9rem; }
  .v3 .left-panel .features { margin-top: 2rem; display: flex; flex-direction: column; gap: .8rem; }
  .v3 .left-panel .features .feat {
    display: flex; align-items: center; gap: .6rem; font-size: .85rem; color: #cbd5e1;
  }
  .v3 .left-panel .features .feat .check { color: #22c55e; }
  .v3 .right-panel {
    flex: 1; background: white; display: flex;
    align-items: center; justify-content: center; padding: 2rem;
    max-width: 500px;
  }
  .v3 .right-panel .rp-form { width: 100%; max-width: 380px; }
  .v3 .right-panel .rp-form h3 { font-size: 1.3rem; margin-bottom: .5rem; }
  .v3 .right-panel .rp-form .rp-sub { font-size: .82rem; color: #94a3b8; margin-bottom: 1.5rem; }
  .v3 .right-panel .fg { margin-bottom: 1rem; }
  .v3 .right-panel .fg label {
    display: block; font-size: .8rem; font-weight: 500; color: #475569; margin-bottom: .2rem;
  }
  .v3 .right-panel .fg input {
    width: 100%; padding: .7rem; border: 2px solid #e2e8f0; border-radius: 8px;
    font-size: .88rem; outline: none; transition: all .25s;
  }
  .v3 .right-panel .fg input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
  .v3 .right-panel .fg input.error { border-color: #ef4444; animation: shake .4s ease; }
  .v3 .right-panel .fg .h { font-size: .68rem; margin-top: .2rem; min-height: .9rem; }
  .v3 .right-panel .fg .h.err { color: #dc2626; }
  .v3 .split-btn {
    width: 100%; padding: .75rem; background: #1e293b; color: white;
    border: none; border-radius: 8px; font-size: .9rem; font-weight: 700;
    cursor: pointer; transition: all .2s;
  }
  .v3 .split-btn:hover { background: #334155; }
  .v3 .split-btn.loading { background: #94a3b8; pointer-events: none; }

  @media (max-width: 768px) {
    .v3 { flex-direction: column; }
    .v3 .left-panel { padding: 2rem 1.5rem; }
    .v3 .right-panel { max-width: 100%; }
  }

  /* 成功遮罩 */
  .success-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden; transition: all .3s;
  }
  .success-overlay.show { opacity: 1; visibility: visible; }
  .success-box {
    background: white; border-radius: 20px; padding: 3rem 2rem;
    text-align: center; color: #1e293b;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .success-box .check {
    font-size: 4rem; animation: popIn .5s cubic-bezier(.34,1.56,.64,1) .2s both;
  }
</style>
</head>
<body>

<!-- 切换栏 -->
<div class="switch-bar">
  <div class="logo">🔐 登录页设计 Demo</div>
  <button class="on" onclick="switchView('v1')">1. 单栏卡片式</button>
  <button onclick="switchView('v2')">2. 玻璃拟态悬浮</button>
  <button onclick="switchView('v3')">3. 左文右表单分屏</button>
  <span style="font-size:.7rem;color:#64748b;margin-left:auto">WCAG AA ≥4.5:1 · HTTPS · 实时校验 · 防重复提交</span>
</div>

<!-- ===== 布局1 ===== -->
<div class="view v1 on" id="view-v1">
  <div class="login-card">
    <div class="card-logo"><span>🚀 智序科技</span></div>
    <form onsubmit="handleLogin(event, 'v1')" novalidate>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" placeholder="name@example.com" id="v1-email" oninput="liveValidate('v1')" onblur="liveValidate('v1')">
        <div class="hint" id="v1-email-hint"></div>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" placeholder="至少6位" id="v1-pwd" oninput="liveValidate('v1')" onblur="liveValidate('v1')">
        <div class="hint" id="v1-pwd-hint"></div>
      </div>
      <button type="submit" class="login-btn" id="v1-btn">
        <span class="btn-spinner"></span><span class="btn-text">登录</span>
      </button>
    </form>
    <div class="extra-links">
      <a href="#">忘记密码？</a>
      <a href="#">注册账号</a>
    </div>
    <div class="social-row">
      <button class="social-btn" title="微信">💬</button>
      <button class="social-btn" title="GitHub">🐙</button>
      <button class="social-btn" title="Apple">🍎</button>
    </div>
  </div>
</div>

<!-- ===== 布局2 ===== -->
<div class="view v2" id="view-v2">
  <div class="glass-card">
    <h2>欢迎回来</h2>
    <p class="subtitle">登录您的账户以继续</p>
    <form onsubmit="handleLogin(event, 'v2')" novalidate>
      <div class="fg">
        <input type="email" placeholder="邮箱地址" id="v2-email" oninput="liveValidate('v2')" onblur="liveValidate('v2')">
        <div class="h" id="v2-email-hint"></div>
      </div>
      <div class="fg">
        <input type="password" placeholder="密码" id="v2-pwd" oninput="liveValidate('v2')" onblur="liveValidate('v2')">
        <div class="h" id="v2-pwd-hint"></div>
      </div>
      <button type="submit" class="glass-btn" id="v2-btn">登录</button>
    </form>
    <div class="v2-links">
      <a href="#">忘记密码？</a> · <a href="#">创建账户</a>
    </div>
  </div>
</div>

<!-- ===== 布局3 ===== -->
<div class="view v3" id="view-v3">
  <div class="left-panel">
    <div class="lp-content">
      <h2>构建下一代<br>数字产品</h2>
      <p>智序科技为企业提供一站式数字化解决方案。<br>从设计到部署，我们全程护航。</p>
      <div class="features">
        <div class="feat"><span class="check">✅</span> 银行级数据加密 (AES-256)</div>
        <div class="feat"><span class="check">✅</span> 99.99% 服务可用性 SLA</div>
        <div class="feat"><span class="check">✅</span> 7×24 小时技术支持</div>
        <div class="feat"><span class="check">✅</span> SOC 2 Type II 合规认证</div>
      </div>
    </div>
  </div>
  <div class="right-panel">
    <div class="rp-form">
      <h3>登录您的账户</h3>
      <p class="rp-sub">没有账号？<a href="#" style="color:#3b82f6;text-decoration:none">免费注册</a></p>
      <form onsubmit="handleLogin(event, 'v3')" novalidate>
        <div class="fg">
          <label>邮箱地址</label>
          <input type="email" placeholder="name@company.com" id="v3-email" oninput="liveValidate('v3')" onblur="liveValidate('v3')">
          <div class="h" id="v3-email-hint"></div>
        </div>
        <div class="fg">
          <label>密码</label>
          <input type="password" placeholder="输入密码" id="v3-pwd" oninput="liveValidate('v3')" onblur="liveValidate('v3')">
          <div class="h" id="v3-pwd-hint"></div>
        </div>
        <button type="submit" class="split-btn" id="v3-btn">登录</button>
      </form>
    </div>
  </div>
</div>

<!-- 成功提示 -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="check">✅</div>
    <h3 style="margin:.5rem 0">登录成功！</h3>
    <p style="color:#64748b;font-size:.85rem">正在跳转到工作台...</p>
  </div>
</div>

<script>
function switchView(view) {
  document.querySelectorAll('.switch-bar button').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
  document.querySelector(`.switch-bar button:nth-child(${view === 'v1' ? '2' : view === 'v2' ? '3' : '4'})`).classList.add('on');
  document.getElementById('view-' + view).classList.add('on');
}

// 实时校验
function liveValidate(prefix) {
  const email = document.getElementById(prefix + '-email');
  const pwd = document.getElementById(prefix + '-pwd');
  const emailHint = document.getElementById(prefix + '-email-hint');
  const pwdHint = document.getElementById(prefix + '-pwd-hint');

  // 邮箱
  if (email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
    email.classList.add('error'); email.classList.remove('valid');
    if (emailHint) { emailHint.textContent = '✗ 请输入有效的邮箱地址'; emailHint.className = 'hint err'; }
    if (!emailHint) { emailHint = document.getElementById(prefix+'-email-hint'); }
  } else if (email.value) {
    email.classList.remove('error'); email.classList.add('valid');
    if (emailHint) { emailHint.textContent = '✓ 格式正确'; emailHint.className = 'hint ok'; }
    if (!emailHint) { /* glass layout uses .h */ }
  }

  // 密码
  if (pwd.value && pwd.value.length < 6) {
    pwd.classList.add('error'); pwd.classList.remove('valid');
    if (pwdHint) { pwdHint.textContent = '✗ 密码至少6位'; pwdHint.className = 'hint err'; }
  } else if (pwd.value) {
    pwd.classList.remove('error'); pwd.classList.add('valid');
    if (pwdHint) { pwdHint.textContent = '✓ 密码强度合格'; pwdHint.className = 'hint ok'; }
  }
}

// 处理登录
function handleLogin(e, prefix) {
  e.preventDefault();
  const email = document.getElementById(prefix + '-email');
  const pwd = document.getElementById(prefix + '-pwd');
  const btn = document.getElementById(prefix + '-btn');

  // 最终校验
  liveValidate(prefix);
  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value);
  const pwdOk = pwd.value.length >= 6;
  if (!emailOk || !pwdOk) return;

  // 防重复提交：禁用按钮+Loading
  btn.classList.add('loading');
  btn.disabled = true;

  // 模拟登录请求（1.5秒）
  setTimeout(() => {
    btn.classList.remove('loading');
    btn.disabled = false;

    // 显示成功
    const overlay = document.getElementById('successOverlay');
    overlay.classList.add('show');
    setTimeout(() => { overlay.classList.remove('show'); }, 2000);
  }, 1500);
}
</script>
</body>
</html>
